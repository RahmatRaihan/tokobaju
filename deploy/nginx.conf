# =====================================================================
# INSKYLXSTR — Nginx reverse proxy for Laravel Octane (FrankenPHP)
# Put this in /etc/nginx/sites-available/inskylxstr and symlink to
# /etc/nginx/sites-enabled/. Adjust `server_name` and paths.
#
# Octane runs the app on 127.0.0.1:8000; Nginx terminates TLS, serves
# static files directly, and proxies everything else to Octane.
# =====================================================================

server {
    listen 80;
    listen [::]:80;
    server_name inskylxstr.com www.inskylxstr.com;

    # Redirect all HTTP to HTTPS (once certbot has issued the cert).
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name inskylxstr.com www.inskylxstr.com;

    # TLS — issued by certbot (Let's Encrypt).
    ssl_certificate     /etc/letsencrypt/live/inskylxstr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inskylxstr.com/privkey.pem;

    # App document root (Laravel public/).
    root /var/www/inskylxstr/public;
    index index.php;

    # Max upload size — must be >= PHP post_max_size (several 10MB product images per POST).
    client_max_body_size 64M;

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression for text assets.
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Serve built assets & uploads straight from disk with long cache.
    location ^~ /build/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ^~ /storage/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Everything else -> Octane worker.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 60s;
    }
}
